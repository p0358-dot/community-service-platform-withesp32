<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 社区服务平台</title>
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
    <section class="auth-card">
        <h1 class="auth-title">账号注册</h1>
        <p class="auth-subtitle">注册后可直接登录用户端系统</p>
        <form id="register-form" class="auth-form">
            <label>用户名</label>
            <input id="username" type="text" placeholder="请输入用户名" required>
            <label>姓名</label>
            <input id="name" type="text" placeholder="请输入姓名">
            <label>手机号</label>
            <input id="phone" type="text" placeholder="请输入手机号">
            <label>邮箱</label>
            <input id="email" type="email" placeholder="请输入邮箱">
            <label>密码</label>
            <input id="password" type="password" placeholder="请输入密码（至少6位）" required>
            <label>确认密码</label>
            <input id="password-confirm" type="password" placeholder="请再次输入密码" required>
            <button class="auth-btn" type="submit">注册并登录</button>
        </form>
        <div class="auth-links">
            <a href="/auth/login.html">已有账号？去登录</a>
            <a href="/user/">返回用户首页</a>
        </div>
        <div id="auth-error" class="auth-error"></div>
    </section>
    <script src="./auth.js"></script>
</body>
</html>
